<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX — Watch Free</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo" onclick="loadTrending()">FLUX</div>
    <div class="nav-links">
        <span class="nav-link active" onclick="loadTrending()">Home</span>
        <span class="nav-link" onclick="filterByType('movie')">Movies</span>
        <span class="nav-link" onclick="filterByType('tv')">TV Shows</span>
    </div>
    <div class="nav-right">
        <div class="search-wrap">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchMedia('searchInput')">
        </div>
        <div class="avatar">F</div>
    </div>
</nav>

<div class="mobile-search-bar" id="mobSearchBar">
    <div class="mob-search-wrap">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="mobileSearchInput" placeholder="Type to search movies & shows..." onkeyup="searchMedia('mobileSearchInput')">
    </div>
</div>

<div id="homePage">
    <section class="hero" id="hero">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-gradient"></div>
        <div class="hero-bottom-fade"></div>
        <div class="hero-content">
            <div class="hero-eyebrow" id="heroMeta">TRENDING</div>
            <h1 class="hero-title" id="heroTitle">Loading...</h1>
            <p class="hero-overview" id="heroOverview"></p>
            <div class="hero-tags" id="heroTags"></div>
            <div class="hero-actions">
                <button class="btn-primary" id="heroPlayBtn"><i class="ph ph-play-fill"></i> Play Now</button>
                <button class="btn-ghost" id="heroInfoBtn"><i class="ph ph-info"></i> More Info</button>
            </div>
        </div>
    </section>

    <section class="shelf" id="trendingShelf">
        <div class="shelf-header">
            <h2 class="shelf-title" id="shelfTitle">Trending Now</h2>
            <div class="shelf-nav">
                <button class="shelf-btn" id="trendPrev"><i class="ph ph-caret-left"></i></button>
                <button class="shelf-btn" id="trendNext"><i class="ph ph-caret-right"></i></button>
            </div>
        </div>
        <div class="shelf-track" id="trendingTrack"></div>
    </section>

    <section class="top10-section" id="top10Section">
        <div class="shelf-header">
            <h2 class="shelf-title">Top 10 Today</h2>
        </div>
        <div class="top10-grid" id="top10Grid"></div>
    </section>

    <section class="search-section" id="searchSection">
        <div class="shelf-header">
            <h2 class="shelf-title" id="searchLabel">Results</h2>
        </div>
        <div class="search-grid" id="searchGrid"></div>
    </section>
</div>

<div class="player-page" id="playerPage">
    <div class="player-topbar">
        <div class="player-topbar-left">
            <span class="player-show-title" id="playerShowTitle">Now Playing</span>
            <span class="player-ep-label" id="playerEpLabel"></span>
        </div>
        <button class="player-close" onclick="closePlayer()"><i class="ph ph-x"></i></button>
    </div>

    <div class="source-bar">
        <span class="source-label">SOURCE</span>
        <div class="source-btns" id="sourceBtns"></div>
        <span class="source-tip">Try another if video won't load</span>
    </div>

    <div class="player-screen" id="playerScreen">
        <iframe id="videoPlayer" src="" frameBorder="0" scrolling="no" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
        <button class="player-fullscreen-btn" onclick="goFullscreen()"><i class="ph ph-arrows-out"></i> Fullscreen</button>
    </div>

    <div class="tv-controls" id="tvControls">
        <div class="season-bar">
            <span class="season-label">Season</span>
            <div class="season-tabs" id="seasonTabs"></div>
        </div>
        <div class="episodes-panel" id="episodesPanel"></div>
    </div>
</div>

<nav class="mobile-nav">
    <div class="mob-btn active" onclick="loadTrending()"><i class="ph ph-house-fill"></i><span>Home</span></div>
    <div class="mob-btn" onclick="filterByType('movie')"><i class="ph ph-film-strip"></i><span>Movies</span></div>
    <div class="mob-btn" onclick="filterByType('tv')"><i class="ph ph-television"></i><span>Shows</span></div>
    <div class="mob-btn" onclick="toggleMobileSearch()"><i class="ph ph-magnifying-glass"></i><span>Search</span></div>
</nav>

<script src="script.js"></script>
</body>
</html>
